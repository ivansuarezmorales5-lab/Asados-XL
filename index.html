<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASADOS XL</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{ --main:#ff6b00; }

body { background:#f4f4f9; font-family:sans-serif; }

.btn{
border-radius:10px;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.btn:active{ transform:scale(0.95); }

.mesa-btn{
position:relative;
border-radius:12px;
}

.mesa-btn.ocupada::after{
content:"";
position:absolute;
top:6px;
right:6px;
width:8px;
height:8px;
background:#facc15;
border-radius:50%;
}
</style>
</head>

<body class="pb-44">

<nav class="bg-black text-white p-4 text-center font-bold">
ASADOS XL 🔥
</nav>

<div id="lista-mesas" class="flex gap-2 p-2 bg-black/90 overflow-x-auto"></div>

<main class="p-3 max-w-xl mx-auto">

<div class="bg-white p-4 rounded-xl shadow mb-3">
<b>Mesa <span id="m-tit">1</span></b>
<div id="lista-firme" class="mt-2"></div>
</div>

<div id="menu" class="grid grid-cols-2 gap-3"></div>

</main>

<footer class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-lg">

<div id="total-txt"></div>

<div class="grid grid-cols-2 gap-2 mt-2">
<button onclick="cargarAMesa()" class="btn bg-green-500 text-white p-3">Cargar</button>
<button onclick="verFactura()" class="btn bg-[var(--main)] text-white p-3">Ticket</button>
</div>

<button onclick="finalizar()" class="btn w-full bg-black text-white p-3 mt-2">
Cerrar Mesa
</button>

</footer>

<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-white w-[300px] p-5 shadow-2xl rounded-sm">

<div class="text-center mb-2">
<div class="text-lg font-bold tracking-widest">ASADOS XL</div>
<div class="text-xs text-gray-500" id="fecha"></div>
</div>

<div class="border-t border-dashed my-2"></div>

<div id="ticket-items" class="text-sm"></div>

<div class="border-t border-dashed my-2"></div>

<div id="ticket-totales" class="text-sm"></div>

<div class="border-t border-dashed my-2"></div>

<div class="text-right text-lg font-black text-black" id="ticket-total"></div>

<button onclick="cerrarModal()" class="w-full mt-4 bg-black text-white py-2 rounded">
VOLVER
</button>

</div>
</div>

<script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

const productos = [
{ id:1, n:"Cerdo", p:20000 },
{ id:2, n:"Costichip", p:25000 },
{ id:3, n:"Chorizo", p:15000 },
{ id:4, n:"Cerdo XL", p:27000 },
{ id:5, n:"Chicharrón", p:22000 },
{ id:6, n:"Punta de Anca", p:30000 },
{ id:7, n:"Churrasco", p:30000 },
{ id:8, n:"Chocolate", p:6000 },
{ id:9, n:"Chocolate con Queso", p:8000 },
{ id:10, n:"Gaseosa", p:5000 },
{ id:11, n:"Res", p:21000 },
{ id:12, n:"Arepa + Piña", p:3000 },
{ id:13, n:"Adición Extra", p:2000 }
];

let mesas = {};
let temp = {};
let mesaActual = 1;

const formato = n => "$" + n.toLocaleString();

function guardar(){
localStorage.setItem("mesas",JSON.stringify(mesas));
}

function cargar(){
let data = localStorage.getItem("mesas");
if(!data){
mesas = {};
return;
}
try{
mesas = JSON.parse(data);
}catch(e){
mesas = {};
localStorage.removeItem("mesas");
}
}

for(let i=1;i<=13;i++){
temp[i]={};
productos.forEach(p=>temp[i][p.id]=0);
}

function init(){
cargar();

for(let i=1;i<=13;i++){
if(!mesas[i]) mesas[i]=[];
}

let cont = document.getElementById("lista-mesas");
for(let i=1;i<=13;i++){
cont.innerHTML+=`<button onclick="cambiarMesa(${i})" id="m${i}" class="mesa-btn bg-gray-700 text-white px-4 py-2">M${i}</button>`;
}

renderMenu();
actualizarUI();
}

function cambiarMesa(n){
mesaActual=n;
actualizarUI();
}

function qty(id,v){
if((temp[mesaActual][id] || 0) + v >= 0){
temp[mesaActual][id]+=v;
renderMenu();
total();
}
}

function cargarAMesa(){
let data = mesas[mesaActual];

productos.forEach(p=>{
let q=temp[mesaActual][p.id] || 0;
if(q>0){
let ex=data.find(i=>i.id===p.id);
if(ex) ex.cant+=q;
else data.push({id:p.id,n:p.n,cant:q,p:p.p});
temp[mesaActual][p.id]=0;
}
});

guardar();
renderMenu();
renderLista();
total();
actualizarIndicadores();
}

function eliminar(i){
mesas[mesaActual].splice(i,1);
guardar();
renderLista();
total();
actualizarIndicadores();
}

function renderMenu(){
let m=document.getElementById("menu");
m.innerHTML="";
productos.forEach(p=>{
let q=temp[mesaActual][p.id] || 0;
m.innerHTML+=`
<div class="bg-white p-3 rounded-xl shadow">
<b>${p.n}</b>
<div class="text-[var(--main)] font-bold">${formato(p.p)}</div>
<div class="flex justify-between mt-2 items-center">
<button class="btn bg-gray-200 px-3" onclick="qty(${p.id},-1)">-</button>
<span class="font-bold">${q}</span>
<button class="btn bg-[var(--main)] text-white px-3" onclick="qty(${p.id},1)">+</button>
</div>
</div>`;
});
}

function renderLista(){
let l=document.getElementById("lista-firme");
l.innerHTML="";
(mesas[mesaActual] || []).forEach((i,idx)=>{
l.innerHTML+=`
<div class="flex justify-between items-center border-b py-1">
<span>${i.cant}x ${i.n}</span>
<span>${formato(i.cant*i.p)}</span>
<button onclick="eliminar(${idx})" class="text-red-500 text-sm">✕</button>
</div>`;
});
}

function total(){
let sub=0;
(mesas[mesaActual] || []).forEach(i=>sub+=i.cant*i.p);
productos.forEach(p=>{
sub += (temp[mesaActual][p.id] || 0) * p.p;
});
document.getElementById("total-txt").innerHTML=`
<div class="text-xs text-gray-400">Total</div>
<div class="text-2xl font-bold">${formato(sub)}</div>`;
}

function actualizarIndicadores(){
for(let i=1;i<=13;i++){
let btn = document.getElementById("m"+i);
if(mesas[i].length > 0){
btn.classList.add("ocupada");
}else{
btn.classList.remove("ocupada");
}
}
}

function actualizarUI(){
document.getElementById("m-tit").innerText=mesaActual;
document.querySelectorAll(".mesa-btn").forEach(b=>b.classList.remove("bg-[var(--main)]"));
document.getElementById("m"+mesaActual).classList.add("bg-[var(--main)]");
renderLista();
total();
actualizarIndicadores();
}

function verFactura(){
let data=mesas[mesaActual];
if(data.length==0) return alert("Mesa vacía");

let sub=0;
let fecha = new Date();

document.getElementById("fecha").innerText =
fecha.toLocaleDateString() + " - " + fecha.toLocaleTimeString();

let itemsHTML="";

data.forEach(i=>{
let total=i.cant*i.p;
sub+=total;
itemsHTML+=`
<div class="flex justify-between">
<span>${i.cant}x ${i.n}</span>
<span>${formato(total)}</span>
</div>`;
});

document.getElementById("ticket-items").innerHTML=itemsHTML;

let prop=Math.round(sub*0.1);
let totalFinal=sub+prop;

document.getElementById("ticket-totales").innerHTML=`
<div class="flex justify-between"><span>Subtotal:</span><span>${formato(sub)}</span></div>
<div class="flex justify-between text-gray-500"><span>Servicio:</span><span>${formato(prop)}</span></div>
`;

document.getElementById("ticket-total").innerHTML =
"TOTAL: " + formato(totalFinal);

document.getElementById("modal").classList.remove("hidden");
}

function cerrarModal(){
document.getElementById("modal").classList.add("hidden");
}

function finalizar(){
mesas[mesaActual].length = 0;
productos.forEach(p=> temp[mesaActual][p.id]=0);
guardar();
renderLista();
renderMenu();
total();
actualizarIndicadores();
}

setTimeout(init,300);

</script>

</body>
</html>
